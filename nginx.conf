server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API and data.js to the colocated uvicorn process
    # ^~ gives this block higher priority than regex locations below,
    # preventing /api/v1/data.js from being matched by ~* \.(js)$
    location ^~ /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # Serve .jsx files with correct MIME type for Babel standalone.
    # no-cache: browser revalidates each load so deploys are picked up
    # immediately (the files are tiny and gzipped — caching them buys nothing).
    location ~* \.jsx$ {
        default_type application/javascript;
        add_header Cache-Control "no-cache";
    }

    location ~* \.(css|js)$ {
        add_header Cache-Control "no-cache";
    }

    location = / {
        add_header Cache-Control "no-cache";
        try_files /index.html =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    client_max_body_size 100M;

    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript text/javascript application/json;
}
